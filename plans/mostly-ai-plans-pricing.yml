description: Machine-readable plans scaffold for the MOSTLY AI API surface. Conforms to the API Commons Plans schema. Tier
  limits and prices are scaffold defaults; replace with provider-published values.
plans:
- id: mostly-ai-free
  name: Free
  type: freemium
  description: Free entry tier for the MOSTLY AI API surface. Intended for evaluation, prototyping, and low-volume integrations.
    Real limits and pricing must be reconciled with the provider's published plan documentation.
  entries:
  - label: API Requests
    description: Monthly API request quota across all included endpoints
    name: api_requests
    type: quota
    metric: requests
    limit: 1000
    timeFrame: month
    geo: global
    domains:
    - https://app.mostly.ai
    unit: 1
    price: '0.00'
    userMultiplied: false
  - label: Rate Limit
    description: Maximum requests per minute on the free tier
    name: rate_limit
    type: rate
    metric: requests_per_minute
    limit: 10
    timeFrame: minute
    geo: global
    domains:
    - https://app.mostly.ai
    unit: 1
    price: '0.00'
references:
- name: MOSTLY AI API Documentation
  url: https://raw.githubusercontent.com/api-evangelist/mostly-ai/refs/heads/main/apis.yml
